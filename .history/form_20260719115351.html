<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Routine & Solat Time</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="Welcome">Assalamualaikum, o people who are seeking the truth!</h1>
  <div class="flip-container" id="flip-container">
    <div class="flipper">
      <!-- FRONT: Sign In -->
      <section class="card front">
        <h2>Sign Ingsghso</h2>
        <h2>sgssea</h2>
        <input class="input-box" id="loginUsername" type="text" placeholder="Username" required autocomplete="off">
        <input class="input-box" id="loginPassword" type="password" placeholder="Password" required autocomplete="off">
        <button id="loginBtn">Login</button>
        <p class="toggle" id="toSignUp">Don't have an account? Sign Up</p>
        <p class="toggle" id="Forgot">Forgot Password</p>
      </section>

      <!-- BACK: Sign Up -->
      <section class="card back">
        <h2>Sign Up</h2>   
        <input class="input-box" id="fullName" type="text" placeholder="Full Name" required autocomplete="off">
        <input class="input-box" id="signUpUsername" type="text" placeholder="Username" required autocomplete="off">
        <input class="input-box" id="signUpEmail" type="email" placeholder="Email" required autocomplete="off">
        <input class="input-box" id="signUpPassword" type="password" placeholder="Password" required autocomplete="off">
        <button id="signUpBtn">Sign Up</button>
        <p class="toggle" id="toSignIn">Already have an account? Sign In</p>
      </section>
    </div>
  </div>
  <script src="function.js"></script>
</body>
</html>
